<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Arcade Luar Angkasa!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        .header h1 {
            font-size: 28px;
            color: #ffeaa7;
            margin-bottom: 5px;
        }

        .game-title {
            font-size: 18px;
            color: #55efc4;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        #gameCanvas {
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid #0984e3;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        .ui-container {
            margin-top: 15px;
            text-align: center;
            z-index: 10;
        }

        .score-board {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #e17055;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin: 3px;
        }

        .btn:hover {
            background-color: #fab1a0;
            transform: translateY(-2px);
        }

        .btn-blue { background-color: #0984e3; }
        .btn-blue:hover { background-color: #74b9ff; }

        .btn-purple { background-color: #6c5ce7; }
        .btn-purple:hover { background-color: #a29bfe; }
    </style>
</head>
<body>

    <div class="header">
        <h1>404: Halaman Hilang, Terbitlah Game!</h1>
        <div class="game-title" id="currentGameName">Loading Game...</div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="ui-container">
        <div class="score-board">Skor: <span id="score">0</span></div>
        <button class="btn" id="actionBtn" onclick="startGame()">Mulai Game</button>
        <button class="btn btn-purple" onclick="switchGameRandomly()">Ganti Game Acak 🎲</button>
        <a href="/" class="btn btn-blue">Pulang ke Home</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const actionBtn = document.getElementById('actionBtn');
        const gameTitleEl = document.getElementById('currentGameName');

        let gameActive = false;
        let score = 0;
        let currentGameIndex = 0; // 0: Meteor, 1: Jump
        let animationFrameId;

        // ==========================================
        // ASSET & BASE CONFIG
        // ==========================================
        const astronaut = { x: 200, y: 330, size: 35, vy: 0, isJumping: false };
        
        // Game 1: Meteor Vars
        let meteors = [];
        let spawnRate = 0.05;
        let speedMultiplier = 1;

        // Game 2: Jump Vars
        let platforms = [];
        let platformSpeed = 3;
        let gravity = 0.6;

        // ==========================================
        // CONTROLS (Mouse, Touch, Spacebar)
        // ==========================================
        canvas.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            if (currentGameIndex === 0) { // Game Meteor ikut kursor
                astronaut.x = e.clientX - rect.left - (astronaut.size / 2);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            if (currentGameIndex === 0) {
                astronaut.x = e.touches[0].clientX - rect.left - (astronaut.size / 2);
            }
            e.preventDefault();
        }, { passive: false });

        // Klik canvas / Spasi untuk melompat di Game 2
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" && currentGameIndex === 1) {
                jump();
                e.preventDefault();
            }
        });
        canvas.addEventListener('click', () => {
            if (currentGameIndex === 1) jump();
        });

        function jump() {
            if (gameActive && !astronaut.isJumping) {
                astronaut.vy = -12;
                astronaut.isJumping = true;
            }
        }

        // ==========================================
        // GAME LOGIC 1: HINDARI METEOR
        // ==========================================
        function loopMeteor() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spawn
            if (Math.random() < spawnRate) {
                meteors.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    size: Math.random() * 20 + 20,
                    speed: (Math.random() * 3 + 2) * speedMultiplier
                });
            }

            // Update & Draw Astronot
            if (astronaut.x < 0) astronaut.x = 0;
            if (astronaut.x > canvas.width - astronaut.size) astronaut.x = canvas.width - astronaut.size;
            ctx.font = `${astronaut.size}px Arial`;
            ctx.fillText('👨‍🚀', astronaut.x, astronaut.y);

            // Update & Draw Meteor
            for (let i = meteors.length - 1; i >= 0; i--) {
                meteors[i].y += meteors[i].speed;
                ctx.font = `${meteors[i].size}px Arial`;
                ctx.fillText('☄️', meteors[i].x, meteors[i].y);

                // Tabrakan
                if (meteors[i].x < astronaut.x + astronaut.size - 5 &&
                    meteors[i].x + meteors[i].size > astronaut.x + 5 &&
                    meteors[i].y < astronaut.y + astronaut.size - 5 &&
                    meteors[i].y + meteors[i].size > astronaut.y + 5) {
                    gameOver("Kena Meteor! 💥");
                    return;
                }

                if (meteors[i].y > canvas.height) {
                    meteors.splice(i, 1);
                    score++;
                    scoreEl.innerText = score;
                    if (score % 10 === 0) { speedMultiplier += 0.15; spawnRate += 0.005; }
                }
            }
            animationFrameId = requestAnimationFrame(loopMeteor);
        }

        // ==========================================
        // GAME LOGIC 2: LOMPAT BINTANG
        // ==========================================
        function initJumpGame() {
            astronaut.x = 80;
            astronaut.y = 200;
            astronaut.vy = 0;
            platforms = [
                { x: 50, y: 280, width: 100 },
                { x: 200, y: 240, width: 100 },
                { x: 350, y: 260, width: 100 }
            ];
            platformSpeed = 2.5;
        }

        function loopJump() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gravitasi Astronot
            astronaut.vy += gravity;
            astronaut.y += astronaut.vy;

            // Render Astronot
            ctx.font = `${astronaut.size}px Arial`;
            ctx.fillText('👨‍🚀', astronaut.x, astronaut.y);

            // Logika Platform (Bintang Terang)
            let onPlatform = false;
            platforms.forEach(p => {
                p.x -= platformSpeed; // Jalan ke kiri

                // Draw Bintang/Platform
                ctx.fillStyle = '#ffeaa7';
                ctx.fillRect(p.x, p.y, p.width, 8);
                ctx.font = '16px Arial';
                ctx.fillText('⭐', p.x + (p.width/2) - 8, p.y - 15);

                // Cek Pijakan Modulo landing kaki astronot
                if (astronaut.x + astronaut.size - 10 > p.x && 
                    astronaut.x + 10 < p.x + p.width && 
                    astronaut.y + astronaut.size >= p.y && 
                    astronaut.y + astronaut.size <= p.y + 12 && 
                    astronaut.vy > 0) {
                    astronaut.y = p.y - astronaut.size;
                    astronaut.vy = 0;
                    astronaut.isJumping = false;
                    onPlatform = true;
                }
            });

            // Generate platform baru kalau yang lama hilang
            if (platforms[0].x + platforms[0].width < 0) {
                platforms.shift();
                score++;
                scoreEl.innerText = score;
                platformSpeed += 0.1; // Makin lama makin cepat

                let lastP = platforms[platforms.length - 1];
                platforms.push({
                    x: lastP.x + Math.random() * 60 + 110,
                    y: Math.random() * 100 + 180,
                    width: Math.random() * 30 + 70
                });
            }

            // Jatuh ke Black Hole (Batas bawah canvas)
            if (astronaut.y > canvas.height) {
                gameOver("Jatuh ke Black Hole! 🕳️");
                return;
            }

            animationFrameId = requestAnimationFrame(loopJump);
        }

        // ==========================================
        // CORE ARCADE SYSTEM
        // ==========================================
        const games = [
            { name: "Game 1: Hindari Meteor ☄️", init: () => { meteors = []; speedMultiplier = 1; spawnRate = 0.05; astronaut.x = 200; astronaut.y = 330; }, loop: loopMeteor },
            { name: "Game 2: Lompat Bintang ⭐ (Klik/Spasi)", init: initJumpGame, loop: loopJump }
        ];

        function showInitialScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            gameTitleEl.innerText = games[currentGameIndex].name;
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px Segoe UI';
            ctx.textAlign = 'center';
            if(currentGameIndex === 0) {
                ctx.fillText('Geser mouse kanan-kiri untuk menghindar!', canvas.width / 2, canvas.height / 2);
            } else {
                ctx.fillText('Klik layar / pencet Spasi untuk MELOMPAT!', canvas.width / 2, canvas.height / 2);
            }
            ctx.textAlign = 'left';
        }

        function startGame() {
            cancelAnimationFrame(animationFrameId);
            score = 0;
            scoreEl.innerText = score;
            gameActive = true;
            actionBtn.style.display = 'none';
            
            games[currentGameIndex].init();
            games[currentGameIndex].loop();
        }

        function gameOver(reason) {
            gameActive = false;
            actionBtn.innerText = 'Main Lagi';
            actionBtn.style.display = 'inline-block';

            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff7675';
            ctx.font = 'bold 26px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText(reason, canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px Segoe UI';
            ctx.fillText(`Skor Akhir: ${score}`, canvas.width / 2, canvas.height / 2 + 25);
            ctx.textAlign = 'left';
        }

        function switchGameRandomly() {
            cancelAnimationFrame(animationFrameId);
            gameActive = false;
            actionBtn.innerText = 'Mulai Game';
            actionBtn.style.display = 'inline-block';
            
            // Pilih game lain secara acak
            let nextIndex = Math.floor(Math.random() * games.length);
            if (nextIndex === currentGameIndex) {
                // Biar gak dapet game yang sama berturut-turut
                nextIndex = (currentGameIndex + 1) % games.length;
            }
            currentGameIndex = nextIndex;
            showInitialScreen();
        }

        // Jalankan pas pertama kali load
        showInitialScreen();
    </script>
</body>
</html>
