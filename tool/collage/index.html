<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Auto-Collage</title>
    <style>
        /* --- UI/UX & TAMPILAN (Dark Mode Minimalis) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Kanvas Utama Tempat Kolase */
        #canvas-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            padding-bottom: 100px; /* Jarak agar tidak tertutup panel kontrol */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Wrapper internal untuk kalkulasi area layouting */
        #collage-wrapper {
            width: 100%;
            max-width: 1200px; /* Batas lebar maksimal puzzle agar estetis */
            display: flex;
            flex-direction: column;
            gap: 10px; /* Diatur dinamis via JS */
            transition: gap 0.2s ease;
        }

        .collage-row {
            display: flex;
            width: 100%;
            gap: inherit;
        }

        .collage-item {
            display: block;
            object-fit: contain; /* Memastikan NO-CROP */
            height: 100%;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Instruksi Melayang di Tengah */
        #instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        #instruction h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 10px;
            color: #e0e0e0;
        }

        #instruction p {
            font-size: 1rem;
            color: #888888;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Floating Control Panel */
        #control-panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #ccc;
        }

        .slider-group input[type="range"] {
            appearance: none;
            background: #444;
            height: 6px;
            border-radius: 3px;
            outline: none;
            width: 100px;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00adb5;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            background: #252525;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #333;
            border-color: #666;
        }

        button#btn-download {
            background: #00adb5;
            color: #fff;
            border: none;
        }

        button#btn-download:hover {
            background: #00f5ff;
            box-shadow: 0 0 10px rgba(0, 173, 181, 0.5);
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="collage-wrapper"></div>
    </div>

    <div id="instruction">
        <h1>Instant Auto-Collage</h1>
        <p>Tekan <strong>Ctrl + V</strong> untuk menempelkan gambar (Paste)</p>
    </div>

    <div id="control-panel">
        <div class="slider-group">
            <label for="gap-slider">Jarak (Gap):</label>
            <input type="range" id="gap-slider" min="0" max="20" value="10">
            <span id="gap-value">10px</span>
        </div>
        <div class="btn-group">
            <button id="btn-shuffle">🔀 Shuffle</button>
            <button id="btn-reset">🗑️ Reset</button>
            <button id="btn-download">📥 Unduh (.PNG)</button>
        </div>
    </div>

    <script>
        // --- LOGIKA UTAMA & ALGORITMA PUZZLE PACKING ---

        const wrapper = document.getElementById('collage-wrapper');
        const instruction = document.getElementById('instruction');
        const gapSlider = document.getElementById('gap-slider');
        const gapValue = document.getElementById('gap-value');
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnReset = document.getElementById('btn-reset');
        const btnDownload = document.getElementById('btn-download');

        // Array global untuk menyimpan objek gambar asli (supaya bisa di-shuffle/re-layout)
        let uploadedImages = []; 
        // Tinggi baris target (ideal) dalam pixel untuk algoritma linear partition
        const TARGET_ROW_HEIGHT = 220; 

        // 1. Event Listener Global untuk Paste (Ctrl + V)
        document.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            let imageFound = false;

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();

                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            // Simpan referensi dan dimensi asli gambar
                            uploadedImages.push(img);
                            // Hilangkan instruksi tengah saat gambar pertama masuk
                            if (uploadedImages.length === 1) {
                                instruction.style.opacity = '0';
                            }
                            // Susun ulang kolase
                            renderCollage();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(blob);
                    imageFound = true;
                }
            }
        });

        /**
         * 2. ALGORITMA PENYUSUNAN GAMBAR (Puzzle Packing / No-Crop)
         * * Menggunakan pendekatan "Row-Oriented Linear Partition".
         * Langkah-langkah:
         * A. Hitung rasio aspek (W/H) masing-masing gambar.
         * B. Masukkan gambar ke dalam baris saat ini demi baris.
         * C. Jika total rasio baris tersebut membuat gambar terlalu kecil/terlalu panjang,
         * maka baris ditutup dan tinggi baris dihitung ulang secara proporsional agar 
         * lebar total baris pas 100% mengikuti lebar kontainer (`wrapper`).
         * D. Semua gambar ter-render PENUH tanpa crop (aspek rasio abadi).
         */
        function renderCollage() {
            wrapper.innerHTML = '';
            if (uploadedImages.length === 0) return;

            const containerWidth = wrapper.clientWidth;
            const currentGap = parseInt(gapSlider.value);
            
            let currentRow = [];
            let currentRowWidthRatio = 0;

            uploadedImages.forEach((img, index) => {
                const imgRatio = img.width / img.height;
                // Estimasi lebar gambar jika tingginya disamakan dengan TARGET_ROW_HEIGHT
                const estimatedWidth = TARGET_ROW_HEIGHT * imgRatio;

                currentRow.push({ img, ratio: imgRatio });
                // Menambahkan rasio beserta kompensasi gap antar gambar dalam satu baris
                currentRowWidthRatio += imgRatio;

                // Hitung estimasi lebar total baris termasuk gap
                const totalEstimatedRowWidth = (currentRowWidthRatio * TARGET_ROW_HEIGHT) + ((currentRow.length - 1) * currentGap);

                // Jika baris mendekati atau melebihi batas kontainer, atau ini gambar terakhir
                if (totalEstimatedRowWidth >= containerWidth || index === uploadedImages.length - 1) {
                    
                    // Hitung tinggi ideal untuk baris ini agar pas memenuhi lebar kontainer (100% width)
                    const availableWidthForImages = containerWidth - ((currentRow.length - 1) * currentGap);
                    let rowHeight = availableWidthForImages / currentRowWidthRatio;

                    // Batasi agar baris terakhir yang gambarnya sedikit tidak menjadi terlalu raksasa
                    if (index === uploadedImages.length - 1 && totalEstimatedRowWidth < containerWidth * 0.65) {
                        rowHeight = Math.min(TARGET_ROW_HEIGHT, rowHeight);
                    }

                    // Buat elemen DOM baris baru
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'collage-row';
                    rowDiv.style.height = `${rowHeight}px`;

                    // Masukkan seluruh gambar dalam baris ini ke DOM
                    currentRow.forEach(item => {
                        const imgElement = document.createElement('img');
                        imgElement.src = item.img.src;
                        imgElement.className = 'collage-item';
                        // Kalkulasi lebar berbasis tinggi baris yang sudah dinormalisasi (No-Crop!)
                        imgElement.style.width = `${rowHeight * item.ratio}px`;
                        rowDiv.appendChild(imgElement);
                    });

                    wrapper.appendChild(rowDiv);

                    // Reset penampung baris untuk iterasi berikutnya
                    currentRow = [];
                    currentRowWidthRatio = 0;
                }
            });
        }

        // 3. Fitur Ganti Jarak (Gap Slider)
        gapSlider.addEventListener('input', function() {
            const val = gapSlider.value;
            gapValue.innerText = val + 'px';
            wrapper.style.gap = val + 'px';
            // Panggil render ulang untuk menghitung dimensi baris baru akibat perubahan gap
            renderCollage(); 
        });

        // 4. Fitur Shuffle (Acak Susunan)
        btnShuffle.addEventListener('click', function() {
            if (uploadedImages.length <= 1) return;
            // Algoritma Fisher-Yates Shuffle
            for (let i = uploadedImages.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [uploadedImages[i], uploadedImages[j]] = [uploadedImages[j], uploadedImages[i]];
            }
            renderCollage();
        });

        // 5. Fitur Reset (Hapus Semua)
        btnReset.addEventListener('click', function() {
            if (confirm('Apakah Anda yakin ingin menghapus semua gambar?')) {
                uploadedImages = [];
                wrapper.innerHTML = '';
                instruction.style.opacity = '1';
            }
        });

        // 6. FITUR EKSPOR (Download Hasil High-Res PNG)
        btnDownload.addEventListener('click', function() {
            if (uploadedImages.length === 0) {
                alert('Belum ada gambar yang dimasukkan. Silakan paste gambar terlebih dahulu.');
                return;
            }

            // Dapatkan seluruh baris yang sedang ter-render di layar
            const rows = document.querySelectorAll('.collage-row');
            const currentGap = parseInt(gapSlider.value);
            
            // Hitung dimensi total canvas resolusi tinggi berdasarkan ukuran asli elemen saat ini
            const totalWidth = wrapper.clientWidth;
            let totalHeight = 0;
            rows.forEach((row, idx) => {
                totalHeight += row.clientHeight;
                if (idx < rows.length - 1) totalHeight += currentGap; 
            });

            // Inisialisasi Canvas Virtual untuk menggambar gabungan citra
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = totalWidth;
            exportCanvas.height = totalHeight;
            const ctx = exportCanvas.getContext('2d');

            // Set background canvas hasil unduhan menjadi gelap/transparan (mengikuti tema)
            ctx.fillStyle = '#121212';
            ctx.fillRect(0, 0, totalWidth, totalHeight);

            let currentY = 0;

            // Gambar ulang komponen DOM satu-persatu secara presisi ke dalam kanvas 2D ekspor
            rows.forEach((row) => {
                const rowHeight = row.clientHeight;
                let currentX = 0;
                const items = row.querySelectorAll('.collage-item');

                items.forEach((imgEl) => {
                    const imgWidth = imgEl.clientWidth;
                    
                    // Cari object Image asli yang cocok berdasarkan src
                    const originalImg = uploadedImages.find(i => i.src === imgEl.src);
                    
                    if (originalImg) {
                        // Gambar ke canvas dengan dimensi skala saat ini (No-Crop)
                        ctx.drawImage(originalImg, currentX, currentY, imgWidth, rowHeight);
                    }
                    
                    currentX += imgWidth + currentGap;
                });

                currentY += rowHeight + currentGap;
            });

            // Trigger download file .png dari data URL canvas
            const link = document.createElement('a');
            link.download = `Instant-Auto-Collage-${Date.now()}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        });

        // Deteksi resize layar otomatis agar susunan kolase tetap responsif
        window.addEventListener('resize', renderCollage);
    </script>
</body>
</html>
